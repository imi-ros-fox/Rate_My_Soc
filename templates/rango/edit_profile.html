<h2>Edit Profile</h2>

<form method="post" enctype="multipart/form-data">
    {% csrf_token %}

    <!-- USER FIELDS -->
    <div>
        <label>First Name</label><br>
        <input type="text" name="first_name" value="{{ form.first_name.value|default:'' }}">
    </div>

    <div>
        <label>Last Name</label><br>
        <input type="text" name="last_name" value="{{ form.last_name.value|default:'' }}">
    </div>

    <div>
        <label>Email</label><br>
        <input type="email" name="email" value="{{ form.email.value|default:'' }}">
    </div>

    <hr>

    <!-- PROFILE FIELDS -->
    <div>
        <label>Bio</label><br>
        <textarea name="bio" rows="3">{{ form.bio.value|default:'' }}</textarea>
    </div>

    <div>
        <label>Profile Picture</label><br>
        <input type="file" name="picture">
    </div>

    <div>
        <label>Role</label><br>
        <select name="role">
            <option value="STUDENT" {% if form.role.value == "STUDENT" %}selected{% endif %}>Student</option>
            <option value="PRESIDENT" {% if form.role.value == "PRESIDENT" %}selected{% endif %}>President</option>
        </select>
    </div>

    <br>

    <!-- ERRORS -->
    {% if form.errors %}
        <div style="color:red;">
            {{ form.errors }}
        </div>
    {% endif %}

    <button type="submit">Save</button>
</form>
