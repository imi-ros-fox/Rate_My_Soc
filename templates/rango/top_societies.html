{% extends 'rango/base.html' %}
{% block title_block %}
    Top Rated Societies
{% endblock %}
{% block body_block %}
<h2>Top {{ N }} Rated Societies</h2>
    <ul>
    {% for society in societies %}
        <p>
            {{ forloop.counter }}.
                <a href="{% url 'rango:society_detail' society.pk %}">
                    {{ society.name }}
                </a>
            ⭐ {{ society.avg_rating|floatformat:1 }}
        </p>
    {% endfor %}
    </ul>
{% endblock %}
