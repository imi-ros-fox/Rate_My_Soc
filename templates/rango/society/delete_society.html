{% extends 'rango/base.html' %}
{% load staticfiles %}

{% block title_block %}Delete Society{% endblock %}

{% block extra_css %}<link rel="stylesheet" type="text/css" href="{% static 'css/Sign_up.css' %}">{% endblock %}

{% block body_block %}

<div class="page auth-page">
    <div class="auth-card">
        <h1>Delete Society</h1>
        <p>Are you sure you want to delete <strong>{{ society.name }}</strong>? This cannot be undone.</p>
        <form method="post">
            {% csrf_token %}
            <div class="auth-actions">
                <button class="submit-btn" type="submit">Yes, delete</button>
                <a href="{% url 'rango:society_detail' society.pk %}">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
