<!-- templates/rango/edit_society.html -->
{% extends 'rango/base.html' %}
{% block title_block %}Edit Society{% endblock %}

{% block body_block %}
<h1>Edit Society: {{ society.name }}</h1>

<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Update Society</button>
</form>

<a href="{% url 'rango:society_list' %}">Back to societies list</a>
{% endblock %}
