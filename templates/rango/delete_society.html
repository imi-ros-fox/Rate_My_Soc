<!-- templates/rango/delete_society.html -->
{% extends 'rango/base.html' %}
{% block title_block %}Delete Society{% endblock %}

{% block body_block %}
<h1>Delete Society: {{ society.name }}</h1>
<p>Are you sure you want to delete this society? This action cannot be undone.</p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Yes, Delete</button>
</form>

<a href="{% url 'rango:society_list' %}">Cancel</a>
{% endblock %}
