<!--this is based of w3Scools Star Rating -->

<!DOCTYPE html>

{% extends 'rango/base.html' %}
{% load staticfiles %}
{% block title_block %} 
    Rate My Soc - Star Slider 
{% endblock %}
{% block body_block %}

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

<div class="page">
    <div class="review-card">
        <h1>Add a Review</h1>
        <form method="post">
            {% csrf_token %}
            <label for="rating">Choose a rating</label>
            <input id="rating" name="rating" type="hidden" value="3">
            <div class="clickable-stars">
                <button type="button" class="star-btn" data-value="1" onclick="setRating(1)"></button>
                <button type="button" class="star-btn" data-value="2" onclick="setRating(2)"></button>
                <button type="button" class="star-btn" data-value="3" onclick="setRating(3)"></button>
                <button type="button" class="star-btn" data-value="4" onclick="setRating(4)"></button>
                <button type="button" class="star-btn" data-value="5" onclick="setRating(5)"></button>
            </div>
            <span class="rating-display"><span id="rating-value">3</span>/5</span>
            <label for="review">Write a review </label>
            <textarea class="review" id="review" name="review" rows="6" placeholder="If you only want to leave a rating, leave this blank"></textarea>
            <button class="submit-btn" type="submit">Submit Review</button>
        </form>
    </div>  
</div>

<style>
    .page{
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: calc(100vh - 120px);
    }
    .review-card {
        max-width: 420px;
        padding: 1.5rem;
        border: 1px solid #d7d7d7;
        border-radius: 12px;
        background: #d2eaff;
    }
      .review {
        height: 80px;
        padding: 1.5rem;
        border: 0;
        border-radius: 8px;
        background: #add9ff;
    }
    
    .submit-btn {
        margin-top: 1rem;
        background: #000000;
        color: #ffffff;
        width : fit-content;
    }
    .review-card h1 {
        margin-bottom: 1rem;
    }

    .review-card form {
        display: grid;
        gap: 1rem;
    }

    .review-card label {
        font-weight: 600;
    }

    .clickable-stars {
        display: inline-flex;
        gap: 0.1rem;
    }

    .star-btn {
        border: none;
        background: none;
        cursor: pointer;
        padding: 0;
        font: normal normal normal 14px/1 FontAwesome;
        font-size: 3rem;
        color: #000000;
        transition: color 0.2s;
        width: auto;
    }

    .star-btn::before {
        content: "\f005";
    }

    .star-btn:hover {
        color: #ffaa00;
    }

    .star-btn.active {
        color: #ffaa00;
    }

    .rating-display {
        font-weight: 600;
        margin-left: 0.5rem;
    }

    .review-card button {
        width: fit-content;
        padding: 0.6rem 1rem;
        border: 0;
        border-radius: 8px;
        cursor: pointer;
    }
</style>

<script>
    function setRating(value) {
        document.getElementById('rating').value = value;
        document.getElementById('rating-value').textContent = value;
        
        const buttons = document.querySelectorAll('.star-btn');
        buttons.forEach((btn, index) => {
            if (index < value) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
    }
    document.addEventListener('DOMContentLoaded', function() {
        const rating = document.getElementById('rating').value;
        setRating(rating);
    });
</script>
{% endblock %}
