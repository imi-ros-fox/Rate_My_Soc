<!DOCTYPE html>

{% extends 'rango/base.html' %}
{% load staticfiles %}
{% block title_block %} 
    Rate My Soc - Star Slider 
{% endblock %}
{% block extra_css %}<link rel="stylesheet" type="text/css" href="{% static 'css/review.css' %}">{% endblock %}

{% block body_block %}

<div class="page">
    <div class="review-card">
        <h1>Add a Review</h1>
        <form method="post">
            {% csrf_token %}
            <label for="rating">Choose a rating</label>
            <input id="rating" name="rating" type="hidden" value="3">
            <div class="clickable-stars">
                <button type="button" class="star-btn" data-value="1" onclick="setRating(1)"></button>
                <button type="button" class="star-btn" data-value="2" onclick="setRating(2)"></button>
                <button type="button" class="star-btn" data-value="3" onclick="setRating(3)"></button>
                <button type="button" class="star-btn" data-value="4" onclick="setRating(4)"></button>
                <button type="button" class="star-btn" data-value="5" onclick="setRating(5)"></button>
            </div>
            <span class="rating-display"><span id="rating-value">3</span>/5</span>
            <label for="review">Write a review </label>
            <textarea class="review" id="review" name="review" rows="6" placeholder="If you only want to leave a rating, leave this blank"></textarea>
            <button class="submit-btn" type="submit">Submit Review</button>
        </form>
    </div>  
</div>


<script>
    function setRating(value) {
        document.getElementById('rating').value = value;
        document.getElementById('rating-value').textContent = value;
        
        const buttons = document.querySelectorAll('.star-btn');
        buttons.forEach((btn, index) => {
            if (index < value) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
    }
    document.addEventListener('DOMContentLoaded', function() {
        const rating = document.getElementById('rating').value;
        setRating(rating);
    });
</script>
{% endblock %}
