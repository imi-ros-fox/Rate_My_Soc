<h2>My Upvotes</h2>

{% for upvote in upvotes %}
    <div class="upvote-card">
        <p>Upvoted review on: <strong>{{ upvote.review.society.name }}</strong></p>
        <blockquote>{{ upvote.review.comment }}</blockquote>
        <small>{{ upvote.created_at }}</small>

        <div>
            <form method="post" action="{% url 'rango:delete_upvote' upvote.pk %}">
                {% csrf_token %}
                <button type="submit">Remove Upvote</button>
            </form>
        </div>
    </div>
{% empty %}
    <p>You haven't upvoted any reviews yet.</p>
{% endfor %}
