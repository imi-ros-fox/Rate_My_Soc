<!DOCTYPE html>
{% load staticfiles %}
{% load rango_template_tags %}
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>
        </title>
    </head>
    <body>
        {% if messages %}
          <div class="messages">
            {% for message in messages %}
              <div class="alert
                   {% if message.tags %}alert-{{ message.tags }}{% endif %}">
                {{ message }}
              </div>
            {% endfor %}
          </div>
        {% endif %}
        {% include 'rango/header.html' %}
        <div class="page-main">
            {% block body_block %}
            {% endblock %}
            </ul>
        </div>
    </body>
</html>
